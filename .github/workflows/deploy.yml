name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/costos
            git pull origin main
            cd backend && npm install --production
            cd ../pwacostos && npm install && npm run build
            pm2 restart costos-backend || pm2 start /var/www/costos/ecosystem.config.cjs
            pm2 save
